<!-- src/frontend/listAllProblems.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Problem library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF9F6; --ink:#15161C; --ink-soft:#5A5B66; --mint:#00D9A3; --mint-deep:#00A87E;
    --coral:#FF5A3C; --violet:#6A5AE0; --amber:#E8940A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; padding:40px 24px; }
  h1,h2,h3{ font-family:'Poppins',sans-serif; letter-spacing:-0.02em; }

  .panel{ max-width:960px; margin:0 auto; background:#fff; border-radius:32px; padding:32px 36px 40px;
    box-shadow:0 24px 60px rgba(21,22,28,0.06); border:1px solid rgba(21,22,28,0.06); }

  .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .top h2{ font-size:23px; font-weight:600; }
  .search{ display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid rgba(21,22,28,0.08);
    border-radius:999px; padding:9px 16px; font-size:13px; color:var(--ink-soft); width:220px; }
  .search svg{ width:14px; height:14px; opacity:.5; flex-shrink:0; }

  /* ---------- FILTER BAR ---------- */
  .filters{ margin-bottom:8px; }
  .filter-row{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; margin-bottom:14px; }
  .filter-label{ font-size:10.5px; font-weight:700; letter-spacing:.06em; color:var(--ink-soft); text-transform:uppercase; margin-right:2px; }
  .pillgroup{ display:flex; gap:6px; }
  .fpill{ font-size:12.5px; font-weight:600; padding:6px 13px; border-radius:999px; border:1px solid rgba(21,22,28,0.1);
    color:var(--ink-soft); cursor:pointer; transition:all .2s ease; white-space:nowrap; }
  .fpill.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .fpill.type-hld.active{ background:var(--violet); border-color:var(--violet); }
  .fpill.type-lld.active{ background:var(--coral); border-color:var(--coral); }
  .fpill.type-dsa.active{ background:var(--mint-deep); border-color:var(--mint-deep); }

  .bar-bottom{ display:flex; align-items:center; justify-content:space-between; padding-top:14px; border-top:1px solid rgba(21,22,28,0.06); margin-bottom:6px; }
  .count{ font-size:12.5px; color:var(--ink-soft); }
  .count b{ color:var(--ink); }

  .sort-wrap{ position:relative; }
  .sort-btn{ display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:999px;
    border:1px solid rgba(21,22,28,0.1); background:#fff; cursor:pointer; color:var(--ink); }
  .sort-menu{ position:absolute; right:0; top:calc(100% + 6px); background:#fff; border-radius:14px; border:1px solid rgba(21,22,28,0.08);
    box-shadow:0 14px 34px rgba(21,22,28,0.1); padding:6px; display:none; z-index:5; min-width:170px; }
  .sort-menu.open{ display:block; }
  .sort-opt{ font-size:12.5px; padding:8px 12px; border-radius:8px; cursor:pointer; color:var(--ink-soft); font-weight:500; }
  .sort-opt:hover{ background:var(--paper); }
  .sort-opt.active{ color:var(--ink); font-weight:600; }

  /* ---------- LIST ---------- */
  .list{ display:flex; flex-direction:column; gap:10px; margin-top:18px; }
  .row{ display:flex; align-items:center; gap:16px; padding:16px 18px; border-radius:18px; border:1px solid rgba(21,22,28,0.07);
    cursor:pointer; transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease; }
  .row:hover{ transform:translateY(-3px); box-shadow:0 14px 30px rgba(21,22,28,0.07); }
  .bar{ width:5px; align-self:stretch; border-radius:3px; flex-shrink:0; }
  .bar.hld{ background:var(--violet); } .bar.lld{ background:var(--coral); } .bar.dsa{ background:var(--mint-deep); }

  .row-main{ flex:1; min-width:0; }
  .row-title{ display:flex; align-items:center; gap:8px; }
  .row-title h3{ font-size:14.5px; font-weight:600; }
  .type-tag{ font-size:10px; font-weight:700; letter-spacing:.03em; padding:2px 8px; border-radius:6px; color:#fff; text-transform:uppercase; }
  .type-tag.hld{ background:var(--violet); } .type-tag.lld{ background:var(--coral); } .type-tag.dsa{ background:var(--mint-deep); }
  .row-crux{ font-size:12.5px; color:var(--ink-soft); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .row-right{ display:flex; align-items:center; gap:14px; flex-shrink:0; }
  .diff{ font-size:11px; font-weight:600; padding:4px 10px; border-radius:999px; }
  .diff.easy{ color:var(--mint-deep); background:rgba(0,168,126,0.1); }
  .diff.medium{ color:var(--amber); background:rgba(232,148,10,0.1); }
  .diff.hard{ color:var(--coral); background:rgba(255,90,60,0.1); }
  .mins{ font-size:12px; color:var(--ink-soft); width:48px; text-align:right; }

  .check{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .check.done{ background:var(--mint-deep); color:#fff; }
  .check.pending{ border:1.5px solid rgba(21,22,28,0.15); }

  .empty-state{ text-align:center; padding:50px 0; color:var(--ink-soft); font-size:13.5px; }

  @media (max-width:640px){
    .search{ display:none; } .mins{ display:none; } .row-crux{ display:none; }
  }
</style>
</head>
<body>

<div class="panel">
  <div class="top">
    <h2>Problem library</h2>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span>Search problems&hellip;</span>
    </div>
  </div>

  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">Type</span>
      <div class="pillgroup" id="typeGroup">
        <div class="fpill active" data-val="all">All</div>
        <div class="fpill type-hld" data-val="hld">HLD</div>
        <div class="fpill type-lld" data-val="lld">LLD</div>
        <div class="fpill type-dsa" data-val="dsa">DSA</div>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Difficulty</span>
      <div class="pillgroup" id="diffGroup">
        <div class="fpill active" data-val="all">All</div>
        <div class="fpill" data-val="easy">Easy</div>
        <div class="fpill" data-val="medium">Medium</div>
        <div class="fpill" data-val="hard">Hard</div>
      </div>
      <span class="filter-label" style="margin-left:8px;">Status</span>
      <div class="pillgroup" id="statusGroup">
        <div class="fpill active" data-val="all">All</div>
        <div class="fpill" data-val="done">Completed</div>
        <div class="fpill" data-val="pending">Not started</div>
      </div>
    </div>

    <div class="bar-bottom">
      <div class="count" id="count"><b>0</b> problems</div>
      <div class="sort-wrap">
        <button class="sort-btn" id="sortBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 7h10M4 12h7M4 17h4"/><path d="M16 6v13M16 19l-3-3M16 19l3-3"/></svg>
          <span id="sortLabel">Popularity</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="sort-menu" id="sortMenu">
          <div class="sort-opt active" data-val="popularity">Popularity</div>
          <div class="sort-opt" data-val="alpha">Alphabetical</div>
          <div class="sort-opt" data-val="difficulty">Difficulty</div>
          <div class="sort-opt" data-val="time">Time estimate</div>
        </div>
      </div>
    </div>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
const PROBLEMS = [
  { title:'Design a chat system', crux:'Message ordering, presence, and delivery guarantees', type:'hld', diff:'hard', mins:45, done:false, pop:9 },
  { title:'Design an LRU cache', crux:'Hash map plus doubly linked list, O(1) get and put', type:'dsa', diff:'medium', mins:30, done:true, pop:8 },
  { title:'Design a rate limiter', crux:'Distributed state, sliding windows, fairness under load', type:'hld', diff:'hard', mins:30, done:false, pop:7 },
  { title:'Design a shopping cart', crux:'Cart persistence, price consistency, session handling', type:'lld', diff:'easy', mins:30, done:true, pop:6 },
  { title:'Design a URL shortener', crux:'Unique ID generation and redirect performance', type:'hld', diff:'medium', mins:30, done:true, pop:9 },
  { title:'Design a booking system', crux:'Availability checking, concurrency, double-booking', type:'lld', diff:'medium', mins:30, done:false, pop:5 },
  { title:'Binary search variations', crux:'Search space reduction and boundary conditions', type:'dsa', diff:'medium', mins:30, done:false, pop:6 },
  { title:'Design cache invalidation', crux:'Invalidation propagation, consistency, performance', type:'lld', diff:'hard', mins:45, done:false, pop:4 },
  { title:'Design event sourcing', crux:'Event storage, snapshotting, replay performance', type:'lld', diff:'hard', mins:45, done:false, pop:3 },
  { title:'Two pointers technique', crux:'Pointer movement and termination conditions', type:'dsa', diff:'easy', mins:30, done:true, pop:7 },
];

let state = { type:'all', diff:'all', status:'all', sort:'popularity' };
const DIFF_ORDER = { easy:0, medium:1, hard:2 };

function setupGroup(id, key){
  document.querySelectorAll('#'+id+' .fpill').forEach(el => {
    el.onclick = () => {
      document.querySelectorAll('#'+id+' .fpill').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
      state[key] = el.dataset.val;
      render();
    };
  });
}
setupGroup('typeGroup','type');
setupGroup('diffGroup','diff');
setupGroup('statusGroup','status');

const sortBtn = document.getElementById('sortBtn');
const sortMenu = document.getElementById('sortMenu');
sortBtn.onclick = () => sortMenu.classList.toggle('open');
document.addEventListener('click', e => { if(!sortBtn.contains(e.target) && !sortMenu.contains(e.target)) sortMenu.classList.remove('open'); });
document.querySelectorAll('.sort-opt').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.sort-opt').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
    state.sort = el.dataset.val;
    document.getElementById('sortLabel').textContent = el.textContent;
    sortMenu.classList.remove('open');
    render();
  };
});

function render(){
  let items = PROBLEMS.filter(p =>
    (state.type==='all' || p.type===state.type) &&
    (state.diff==='all' || p.diff===state.diff) &&
    (state.status==='all' || (state.status==='done' ? p.done : !p.done))
  );

  if(state.sort==='popularity') items.sort((a,b)=>b.pop-a.pop);
  if(state.sort==='alpha') items.sort((a,b)=>a.title.localeCompare(b.title));
  if(state.sort==='difficulty') items.sort((a,b)=>DIFF_ORDER[a.diff]-DIFF_ORDER[b.diff]);
  if(state.sort==='time') items.sort((a,b)=>a.mins-b.mins);

  document.getElementById('count').innerHTML = `<b>${items.length}</b> problem${items.length!==1?'s':''}`;

  const list = document.getElementById('list');
  if(items.length===0){
    list.innerHTML = '<div class="empty-state">No problems match these filters.</div>';
    return;
  }

  list.innerHTML = items.map(p => `
    <div class="row">
      <div class="bar ${p.type}"></div>
      <div class="row-main">
        <div class="row-title">
          <h3>${p.title}</h3>
          <span class="type-tag ${p.type}">${p.type}</span>
        </div>
        <div class="row-crux">${p.crux}</div>
      </div>
      <div class="row-right">
        <span class="diff ${p.diff}">${p.diff}</span>
        <span class="mins">${p.mins}m</span>
        <div class="check ${p.done?'done':'pending'}">
          ${p.done ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg>' : ''}
        </div>
      </div>
    </div>
  `).join('');
}
render();
</script>

</body>
</html>
