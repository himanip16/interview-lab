<!-- src/frontend/actionCorousel.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Action carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF9F6;
    --ink:#15161C;
    --ink-soft:#5A5B66;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:48px 24px;
  }
  h1,h2,h3,.display{ font-family:'Poppins',sans-serif; letter-spacing:-0.02em; }

  .panel{
    max-width:1080px; margin:0 auto; background:#fff; border-radius:32px;
    padding:36px 40px 44px; box-shadow:0 24px 60px rgba(21,22,28,0.06); border:1px solid rgba(21,22,28,0.06);
  }

  /* ---------- NAV ---------- */
  .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:34px; gap:24px; }
  .logo{ font-family:'Poppins',sans-serif; font-weight:700; font-size:18px; white-space:nowrap; }
  .logo span{ color:#00A87E; }
  .search{
    flex:1; max-width:340px; display:flex; align-items:center; gap:10px;
    background:var(--paper); border:1px solid rgba(21,22,28,0.08); border-radius:999px;
    padding:10px 18px; font-size:13.5px; color:var(--ink-soft);
  }
  .search svg{ width:15px; height:15px; opacity:.5; flex-shrink:0; }
  .menu{ display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; white-space:nowrap; }

  /* ---------- CAROUSEL ---------- */
  .rail-wrap{ position:relative; }
  .rail{
    display:flex; gap:18px; overflow-x:auto; scroll-behavior:smooth; scroll-snap-type:x mandatory;
    padding:34px 4px 8px; margin:0 -4px;
    scrollbar-width:none;
  }
  .rail::-webkit-scrollbar{ display:none; }

  .card{
    position:relative; flex:0 0 216px; height:300px; border-radius:26px; padding:22px;
    scroll-snap-align:start; cursor:pointer; overflow:visible;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    display:flex; flex-direction:column; justify-content:flex-end;
  }
  .card:hover{ transform:translateY(-8px); }
  .card .icon-float{
    position:absolute; top:-30px; left:50%; transform:translateX(-50%);
    width:84px; height:84px; animation: float 4.5s ease-in-out infinite;
  }
  @keyframes float{ 0%,100%{ transform:translateX(-50%) translateY(0); } 50%{ transform:translateX(-50%) translateY(-8px); } }

  .card h3{ color:#fff; font-size:16.5px; font-weight:600; margin-bottom:4px; }
  .card .meta{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:rgba(255,255,255,0.75); font-weight:500; }
  .card .meta .dot{ width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,0.6); }

  .c1{ background:linear-gradient(160deg,#FF6B4A,#E0432A); }
  .c2{ background:linear-gradient(160deg,#3E6BFF,#213FCC); }
  .c3{ background:linear-gradient(160deg,#262832,#121319); }
  .c4{ background:linear-gradient(160deg,#00E0AB,#00A87E); }
  .c5{ background:linear-gradient(160deg,#FFB930,#E8940A); }
  .c6{ background:linear-gradient(160deg,#7A6BFF,#4C3FD6); }
  .c7{ background:linear-gradient(160deg,#FF4D93,#D62568); }

  /* ---------- FOOTER ---------- */
  .bottom{ display:flex; align-items:center; justify-content:space-between; margin-top:20px; }
  .socials{ display:flex; gap:18px; font-size:13px; color:var(--ink-soft); font-weight:500; }
  .nav-btns{ display:flex; align-items:center; gap:16px; }
  .prev{ font-size:13px; color:var(--ink-soft); font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .next-btn{
    position:relative; width:46px; height:46px; border-radius:50%; border:none; background:var(--ink);
    color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:1;
  }
  .next-ring{
    position:absolute; inset:-6px; border-radius:50%; border:1.5px solid rgba(0,168,126,0.5);
    animation: breathe 2.6s ease-in-out infinite;
  }
  @keyframes breathe{ 0%,100%{ transform:scale(1); opacity:.7; } 50%{ transform:scale(1.18); opacity:0; } }

  @media (max-width:640px){
    .panel{ padding:28px 18px 32px; }
    .search{ display:none; }
  }
</style>
</head>
<body>

<div class="panel">
  <div class="top">
    <div class="logo">interview<span>.</span>lab</div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span>Search actions&hellip;</span>
    </div>
    <div class="menu">Menu
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
    </div>
  </div>

  <div class="rail-wrap">
    <div class="rail" id="rail">

      <div class="card c1">
        <svg class="icon-float" viewBox="0 0 84 84" fill="none">
          <circle cx="42" cy="42" r="40" fill="#fff"/>
          <ellipse cx="42" cy="46" rx="14" ry="10" fill="#FF6B4A"/>
          <circle cx="35" cy="42" r="3" fill="#26282F"/>
          <circle cx="49" cy="42" r="3" fill="#26282F"/>
          <path d="M28 34 Q22 26 16 30" stroke="#FF6B4A" stroke-width="3" stroke-linecap="round" fill="none"/>
          <path d="M56 34 Q62 26 68 30" stroke="#FF6B4A" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
        <h3>Bug hunting</h3>
        <div class="meta"><span>Practice</span><span class="dot"></span><span>15 min</span></div>
      </div>

      <div class="card c2">
        <svg class="icon-float" viewBox="0 0 84 84" fill="none">
          <circle cx="42" cy="42" r="40" fill="#fff"/>
          <rect x="26" y="24" width="32" height="36" rx="4" fill="#3E6BFF"/>
          <path d="M32 44l6 6 12-14" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <h3>Review a PR</h3>
        <div class="meta"><span>Practice</span><span class="dot"></span><span>30 min</span></div>
      </div>

      <div class="card c3">
        <svg class="icon-float" viewBox="0 0 84 84" fill="none">
          <circle cx="42" cy="42" r="40" fill="#fff"/>
          <path d="M26 30h32v6H26z" fill="#262832"/>
          <path d="M26 42h24v5H26z" fill="#262832" opacity=".7"/>
          <path d="M26 52h28v5H26z" fill="#262832" opacity=".45"/>
        </svg>
        <h3>Read a transcript</h3>
        <div class="meta"><span>Library</span><span class="dot"></span><span>Full session</span></div>
      </div>

      <div class="card c4">
        <svg class="icon-float" viewBox="0 0 84 84" fill="none">
          <circle cx="42" cy="42" r="40" fill="#fff"/>
          <rect x="24" y="28" width="36" height="26" rx="3" fill="#00A87E"/>
          <path d="M30 40h10M30 46h16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="24" y="58" width="36" height="4" rx="2" fill="#00A87E" opacity=".4"/>
        </svg>
        <h3>Learn whiteboarding</h3>
        <div class="meta"><span>Learn</span><span class="dot"></span><span>Guided</span></div>
      </div>

      <div class="card c5">
        <svg class="icon-float" viewBox="0 0 84 84" fill="none">
          <circle cx="42" cy="42" r="40" fill="#fff"/>
          <rect x="35" y="24" width="14" height="24" rx="7" fill="#E8940A"/>
          <path d="M28 40a14 14 0 0028 0" stroke="#E8940A" stroke-width="3" stroke-linecap="round" fill="none"/>
          <line x1="42" y1="54" x2="42" y2="60" stroke="#E8940A" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <h3>Live interview with AI</h3>
        <div class="meta"><span>Live</span><span class="dot"></span><span>45 min</span></div>
      </div>

      <div class="card c6">
        <svg class="icon-float" viewBox="0 0 84 84" fill="none">
          <circle cx="42" cy="42" r="40" fill="#fff"/>
          <circle cx="42" cy="42" r="6" fill="#4C3FD6"/>
          <circle cx="42" cy="42" r="13" stroke="#4C3FD6" stroke-width="2.5" fill="none" opacity=".55"/>
          <circle cx="42" cy="42" r="20" stroke="#4C3FD6" stroke-width="2.5" fill="none" opacity=".3"/>
        </svg>
        <h3>Deep dives</h3>
        <div class="meta"><span>Learn</span><span class="dot"></span><span>Topic-based</span></div>
      </div>

      <div class="card c7">
        <svg class="icon-float" viewBox="0 0 84 84" fill="none">
          <circle cx="42" cy="42" r="40" fill="#fff"/>
          <rect x="27" y="46" width="12" height="12" fill="#D62568"/>
          <rect x="39" y="34" width="12" height="24" fill="#FF4D93"/>
          <rect x="51" y="24" width="12" height="34" fill="#D62568"/>
        </svg>
        <h3>Build it</h3>
        <div class="meta"><span>Hands-on</span><span class="dot"></span><span>Self-paced</span></div>
      </div>

    </div>
  </div>

  <div class="bottom">
    <div class="socials"><span>Facebook</span><span>Twitter</span></div>
    <div class="nav-btns">
      <span class="prev" onclick="document.getElementById('rail').scrollBy({left:-234,behavior:'smooth'})">&larr; Prev</span>
      <button class="next-btn" onclick="document.getElementById('rail').scrollBy({left:234,behavior:'smooth'})">
        <div class="next-ring"></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>
  </div>
</div>

</body>
</html>
